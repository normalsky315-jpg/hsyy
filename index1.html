<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>華雄音樂匯｜銷售諮詢系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:#f5f3ef;color:#1a1a1a;min-height:100vh;}

/* Header */
.header{background:#1a1208;padding:14px 20px;position:sticky;top:0;z-index:200;display:flex;justify-content:space-between;align-items:center;}
.header-left .title{font-family:'Noto Serif TC',serif;font-size:18px;color:#c9a227;letter-spacing:2px;}
.header-left .sub{font-size:10px;color:#7a6030;letter-spacing:3px;margin-top:2px;}
.compare-btn{background:transparent;border:1px solid #c9a227;color:#c9a227;padding:7px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;}
.compare-badge{background:#e53e3e;color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;display:none;}
.compare-badge.show{display:inline;}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#1a1208;border-top:1px solid #2a1f00;display:flex;z-index:200;}
.nav-btn{flex:1;padding:10px 4px 14px;text-align:center;border:none;background:none;cursor:pointer;font-family:inherit;font-size:9px;color:#6b5010;transition:color 0.2s;letter-spacing:1px;}
.nav-btn.active{color:#c9a227;}
.nav-icon{font-size:18px;display:block;margin-bottom:3px;}

/* Pages */
.page{display:none;padding-bottom:75px;}
.page.active{display:block;}

/* === BROWSE PAGE === */
.tower-bar{background:#1a1208;padding:12px 20px;border-bottom:1px solid #2a1f00;}
.tower-pills{display:flex;gap:8px;}
.tower-pill{padding:7px 22px;border-radius:4px;border:1px solid #4a3800;font-size:13px;cursor:pointer;background:transparent;color:#8b6030;font-family:inherit;font-weight:500;transition:all 0.2s;}
.tower-pill.active{background:#c9a227;border-color:#c9a227;color:#1a1208;font-weight:700;}

.unit-chips-wrap{background:#f0ece3;padding:12px 20px;border-bottom:1px solid #ddd;}
.chips-label{font-size:10px;color:#999;letter-spacing:2px;margin-bottom:8px;}
.unit-chips{display:flex;flex-wrap:wrap;gap:7px;}
.unit-chip{padding:7px 16px;border-radius:4px;border:1px solid #c5b99a;font-size:13px;cursor:pointer;background:#fff;color:#5a4a2a;font-family:inherit;font-weight:500;transition:all 0.2s;}
.unit-chip.active{background:#1a1208;border-color:#1a1208;color:#c9a227;font-weight:700;}

/* Unit Detail */
.unit-detail{padding:16px 20px;}

.unit-header-card{background:#1a1208;border-radius:10px;padding:18px 20px;margin-bottom:16px;}
.uh-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.uh-id{font-family:'Noto Serif TC',serif;font-size:42px;color:#c9a227;line-height:1;}
.uh-type{font-size:12px;color:#8b6030;letter-spacing:2px;margin-top:4px;}
.uh-price-range{text-align:right;}
.uh-price-label{font-size:10px;color:#6b5010;letter-spacing:1px;}
.uh-price-val{font-family:'Noto Serif TC',serif;font-size:18px;color:#c9a227;margin-top:3px;}
.uh-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.uh-stat{text-align:center;}
.uh-stat-label{font-size:9px;color:#6b5010;letter-spacing:1px;margin-bottom:3px;}
.uh-stat-val{font-size:15px;color:#d4aa40;font-weight:500;}
.uh-stat-unit{font-size:10px;color:#8b6030;}
.add-compare-btn{margin-top:14px;width:100%;background:transparent;border:1px solid #4a3800;color:#a07820;padding:9px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.add-compare-btn.added{background:#c9a227;border-color:#c9a227;color:#1a1208;font-weight:700;}

/* Section card */
.section-card{background:#fff;border-radius:10px;margin-bottom:12px;overflow:hidden;border:1px solid #e8e2d6;}
.section-title{background:#f5f0e8;padding:10px 16px;font-size:11px;font-weight:700;letter-spacing:2px;color:#5a4a2a;border-bottom:1px solid #e8e2d6;}

/* Floor prices */
.floor-row{display:flex;justify-content:space-between;align-items:center;padding:9px 16px;border-bottom:1px solid #f0ebe0;}
.floor-row:last-child{border-bottom:none;}
.floor-row.special{background:#fffbf0;}
.floor-num{font-size:13px;color:#5a4a2a;font-weight:500;}
.floor-ping{font-size:12px;color:#999;}
.floor-price{font-size:15px;color:#1a1208;font-weight:600;}
.floor-price.highlight{color:#b8860b;}
.sold-tag{font-size:10px;background:#f0ebe0;color:#999;padding:2px 8px;border-radius:3px;}

/* Features list */
.feature-item{padding:10px 16px;border-bottom:1px solid #f5f0e8;display:flex;gap:10px;align-items:flex-start;}
.feature-item:last-child{border-bottom:none;}
.feat-dot{width:6px;height:6px;background:#c9a227;border-radius:50%;flex-shrink:0;margin-top:5px;}
.feat-text{font-size:13px;color:#333;line-height:1.6;}

/* Spec table */
.spec-row{display:flex;padding:9px 16px;border-bottom:1px solid #f5f0e8;}
.spec-row:last-child{border-bottom:none;}
.spec-label{font-size:12px;color:#888;width:90px;flex-shrink:0;}
.spec-val{font-size:12px;color:#222;font-weight:500;flex:1;}

/* === COMPARE PAGE === */
.compare-page-inner{padding:16px 20px;}
.compare-selector{background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:14px;border:1px solid #e8e2d6;}
.cs-label{font-size:11px;color:#888;letter-spacing:2px;margin-bottom:10px;}
.cs-chips{display:flex;flex-wrap:wrap;gap:7px;}
.cs-chip{padding:6px 14px;border-radius:4px;border:1px solid #ccc;font-size:12px;cursor:pointer;background:#fff;color:#555;font-family:inherit;transition:all 0.2s;}
.cs-chip.selected{background:#1a1208;border-color:#1a1208;color:#c9a227;}
.cs-chip.disabled{opacity:0.4;cursor:not-allowed;}

.compare-table-wrap{background:#fff;border-radius:10px;border:1px solid #e8e2d6;overflow:hidden;}
.ct-header{display:grid;border-bottom:2px solid #1a1208;}
.ct-row{display:grid;border-bottom:1px solid #f0ebe0;}
.ct-row:last-child{border-bottom:none;}
.ct-label{background:#f5f0e8;padding:10px 14px;font-size:11px;color:#5a4a2a;font-weight:700;letter-spacing:1px;display:flex;align-items:center;}
.ct-cell{padding:10px 14px;font-size:13px;color:#222;border-left:1px solid #f0ebe0;display:flex;align-items:center;justify-content:center;text-align:center;}
.ct-cell.best{color:#b8860b;font-weight:700;}
.ct-unit-id{font-family:'Noto Serif TC',serif;font-size:24px;color:#c9a227;}
.ct-unit-type{font-size:10px;color:#888;letter-spacing:1px;}
.compare-empty{text-align:center;padding:40px 20px;color:#aaa;font-size:14px;}
.compare-section-title{font-size:10px;background:#1a1208;color:#8b6030;padding:8px 14px;letter-spacing:2px;grid-column:1/-1;}

/* === BUDGET PAGE === */
.budget-inner{padding:16px 20px;}
.budget-form{background:#fff;border-radius:10px;padding:16px;margin-bottom:16px;border:1px solid #e8e2d6;}
.budget-title{font-size:11px;color:#888;letter-spacing:2px;margin-bottom:12px;}
.budget-inputs{display:flex;align-items:center;gap:10px;}
.budget-input{flex:1;border:1px solid #ddd;border-radius:6px;padding:10px 12px;font-size:15px;font-family:inherit;color:#1a1208;outline:none;}
.budget-input:focus{border-color:#c9a227;}
.budget-sep{color:#999;font-size:14px;}
.budget-search-btn{background:#1a1208;color:#c9a227;border:none;padding:10px 18px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:700;}
.budget-results{background:#fff;border-radius:10px;border:1px solid #e8e2d6;overflow:hidden;}
.br-header{background:#1a1208;padding:10px 16px;font-size:11px;color:#8b6030;letter-spacing:2px;}
.br-item{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid #f5f0e8;cursor:pointer;}
.br-item:last-child{border-bottom:none;}
.br-item:active{background:#f5f0e8;}
.br-left .br-unit{font-size:14px;font-weight:600;color:#1a1208;}
.br-left .br-info{font-size:12px;color:#888;margin-top:2px;}
.br-price{font-size:16px;color:#b8860b;font-weight:700;}
.br-arrow{color:#ccc;font-size:14px;margin-left:8px;}
.budget-empty{text-align:center;padding:30px;color:#aaa;font-size:13px;}

/* Responsive grid for compare */
.ct-2{grid-template-columns:100px 1fr 1fr;}
.ct-3{grid-template-columns:100px 1fr 1fr 1fr;}
.ct-1{grid-template-columns:100px 1fr;}

/* Placeholder */
.placeholder{text-align:center;padding:40px 20px;color:#aaa;}
.ph-icon{font-size:40px;margin-bottom:10px;}
.ph-text{font-size:14px;}

<!-- ===== PAGE: COMPARE ===== -->
<div class="page" id="page-compare">

</div>

<!-- ===== PAGE: BUDGET ===== -->
<div class="page" id="page-budget">

        <button class="budget-search-btn" onclick="searchBudget()">查詢</button>
      </div>
    </div>
    <div id="budget-results"></div>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-browse" onclick="showPage('browse')">
    <span class="nav-icon">🏠</span>戶型查詢
  </button>
  <button class="nav-btn" id="nav-compare" onclick="showPage('compare')">

  <button class="nav-btn" id="nav-budget" onclick="showPage('budget')">

</div>

// ============================================================
// STATE
// ============================================================
let currentTower = 'A';
let currentUnit = null;
let compareList = [];

// ============================================================
// HELPERS
// ============================================================
function getUnit(id){ return units[id]; }
function getTowerUnits(tower){ return Object.values(units).filter(u=>u.tower===tower); }
function minPrice(u){ return Math.min(...u.floors.map(f=>f.price)); }
function maxPrice(u){ return Math.max(...u.floors.map(f=>f.price)); }

// ============================================================
// PAGE NAVIGATION
// ============================================================
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='compare') renderCompareTable();
  if(name==='compare') renderCompareSelector();
}

// ============================================================
// BROWSE PAGE
// ============================================================
function selectTower(t){
  currentTower = t;
  currentUnit = null;
  document.querySelectorAll('.tower-pill').forEach(p=>p.classList.remove('active'));
  document.getElementById('tower-'+t).classList.add('active');
  renderChips();
  document.getElementById('unit-detail-area').innerHTML = '<div class="placeholder" style="padding:60px 20px;"><div class="ph-icon">🏠</div><div class="ph-text">請選擇戶型</div></div>';
}

function renderChips(){
  const units2 = getTowerUnits(currentTower);
  document.getElementById('unit-chips').innerHTML = units2.map(u=>
    `<button class="unit-chip${currentUnit===u.id?' active':''}" onclick="selectUnit('${u.id}')">${u.id}</button>`
  ).join('');
}

function selectUnit(id){
  currentUnit = id;
  renderChips();
  renderDetail(id);
}

function renderDetail(id){
  const u = getUnit(id);
  const inCompare = compareList.includes(id);
  const lo = minPrice(u), hi = maxPrice(u);
  
  let html = `
  <div class="unit-detail">
    <div class="unit-header-card">
      <div class="uh-top">
        <div>
          <div class="uh-id">${u.id}</div>
          <div class="uh-type">${u.type}</div>
        </div>
        <div class="uh-price-range">
          <div class="uh-price-label">定價區間</div>
          <div class="uh-price-val">${lo.toLocaleString()}～${hi.toLocaleString()} 萬</div>
        </div>
      </div>
      <div class="uh-stats">
        <div class="uh-stat">
          <div class="uh-stat-label">主建坪</div>
          <div class="uh-stat-val">${u.mainPing}<span class="uh-stat-unit">坪</span></div>
        </div>
        <div class="uh-stat">
          <div class="uh-stat-label">公設比</div>
          <div class="uh-stat-val">${u.publicRatio}<span class="uh-stat-unit">%</span></div>
        </div>
        <div class="uh-stat">
          <div class="uh-stat-label">房數</div>
          <div class="uh-stat-val">${u.rooms}<span class="uh-stat-unit">房</span></div>
        </div>
        <div class="uh-stat">
          <div class="uh-stat-label">衛浴</div>
          <div class="uh-stat-val">${u.baths}<span class="uh-stat-unit">衛</span></div>
        </div>
      </div>
      <button class="add-compare-btn ${inCompare?'added':''}" onclick="toggleCompare('${id}')">
        ${inCompare?'✓ 已加入比較':'＋ 加入比較'}
      </button>
    </div>`;

  // Specs
  html += `
    <div class="section-card">
      <div class="section-title">▸ 規格資訊</div>
      ${u.specs.map(s=>`
        <div class="spec-row">
          <div class="spec-label">${s.label}</div>
          <div class="spec-val">${s.val}</div>
        </div>`).join('')}
    </div>`;

  // Features
  html += `
    <div class="section-card">
      <div class="section-title">▸ 銷售亮點</div>
      ${u.features.map(f=>`
        <div class="feature-item">
          <div class="feat-dot"></div>
          <div class="feat-text">${f}</div>
        </div>`).join('')}
    </div>`;

  // Floor prices
  html += `
    <div class="section-card">
      <div class="section-title">▸ 各樓層定價（車位另計）</div>`;
  u.floors.forEach(fl=>{
    html += `
      <div class="floor-row${fl.special?' special':''}">
        <div>
          <div class="floor-num">${fl.f}</div>
          <div class="floor-ping">${fl.ping} 坪</div>
        </div>
        <div class="floor-price${fl.special?' highlight':''}">${fl.price.toLocaleString()} 萬</div>
      </div>`;
  });
  html += `</div></div>`;

  document.getElementById('unit-detail-area').innerHTML = html;
  document.getElementById('unit-detail-area').scrollTop = 0;
  window.scrollTo(0,0);
}

// ============================================================
// COMPARE
// ============================================================
function toggleCompare(id){
  if(compareList.includes(id)){
    compareList = compareList.filter(x=>x!==id);
  } else {
    if(compareList.length>=3){ alert('最多比較3個戶型'); return; }
    compareList.push(id);
  }
  updateCompareBadge();
  if(currentUnit) renderDetail(currentUnit);
}

function updateCompareBadge(){
  const badge = document.getElementById('compare-badge');
  badge.textContent = compareList.length;
  badge.className = 'compare-badge'+(compareList.length>0?' show':'');
}

function renderCompareSelector(){
  const chips = Object.keys(units).map(id=>{
    const sel = compareList.includes(id);
    const dis = !sel && compareList.length>=3;
    const cls2 = 'cs-chip'+(sel?' selected':'')+(dis?' disabled':'');
    const onclick2 = dis ? '' : 'toggleCompareChip(\''+id+'\')';
    return '<button class="'+cls2+'" onclick="'+onclick2+'">'+id+'</button>';
  }).join('');
  document.getElementById('compare-chips').innerHTML = chips;
}

function toggleCompareChip(id){
  toggleCompare(id);
  renderCompareSelector();
  renderCompareTable();
}

function renderCompareTable(){
  if(compareList.length<2){
    document.getElementById('compare-table-area').innerHTML='<div class="compare-empty">請選擇至少兩個戶型進行比較</div>';
    return;
  }
  const us = compareList.map(id=>getUnit(id));
  const cols = us.length+1;
  const cls = `ct-${us.length}`;

  const best = (vals, fn)=>{
    const bv = fn(vals);
    return vals.map(v=>v===bv);
  };

  const pings = us.map(u=>u.mainPing);
  const pubrs = us.map(u=>u.publicRatio);
  const minps = us.map(u=>minPrice(u));
  const maxps = us.map(u=>maxPrice(u));
  const bestPing = best(pings,v=>Math.max(...v));
  const bestMinP = best(minps,v=>Math.min(...v));
  const bestMaxP = best(maxps,v=>Math.min(...v));

  let t = `<div class="compare-table-wrap">`;
  // Header
  t += `<div class="ct-header ${cls}">
    <div class="ct-label">比較項目</div>
    ${us.map(u=>`<div class="ct-cell"><div class="ct-unit-id">${u.id}</div><div class="ct-unit-type">${u.type}</div></div>`).join('')}
  </div>`;

  // Rows
  const row = (label, vals, bests, suffix='')=>`
    <div class="ct-row ${cls}">
      <div class="ct-label">${label}</div>
      ${vals.map((v,i)=>`<div class="ct-cell${bests&&bests[i]?' best':''}">${v}${suffix}</div>`).join('')}
    </div>`;

  t += row('主建坪', pings.map(v=>v+'坪'), bestPing);
  t += row('公設比', pubrs.map(v=>v+'%'), null);
  t += row('最低定價', minps.map(v=>v.toLocaleString()+'萬'), bestMinP);
  t += row('最高定價', maxps.map(v=>v.toLocaleString()+'萬'), bestMaxP);
  t += row('格局', us.map(u=>u.type), null);
  t += row('可售樓層數', us.map(u=>u.floors.length+'層'), null);

  // Features compare
  t += `<div class="ct-row ${cls}"><div class="ct-label" style="background:#f5f0e8;font-weight:700;letter-spacing:1px;font-size:11px;color:#5a4a2a;">銷售特色</div>
    ${us.map(u=>`<div class="ct-cell" style="text-align:left;font-size:11px;line-height:1.7;padding:12px 14px;">${u.features.map(f=>'・'+f).join('<br>')}</div>`).join('')}
  </div>`;

  t += `</div>`;
  document.getElementById('compare-table-area').innerHTML = t;
}

// BUDGET SEARCH
// ============================================================
function searchBudget(){
  const lo = parseInt(document.getElementById('budget-min').value)||0;
  const hi = parseInt(document.getElementById('budget-max').value)||999999;
  
  const results = [];
  Object.values(units).forEach(u=>{
    u.floors.forEach(fl=>{
      if(fl.price>=lo && fl.price<=hi){
        results.push({unit:u, floor:fl.f, price:fl.price, ping:fl.ping});
      }
    });
  });
  results.sort((a,b)=>a.price-b.price);

  if(results.length===0){
    document.getElementById('budget-results').innerHTML='<div class="budget-results"><div class="br-header">查詢結果</div><div class="budget-empty">此預算範圍內無符合戶型，請調整區間</div></div>';
    return;
  }

  let html = `<div class="budget-results"><div class="br-header">找到 ${results.length} 個選項</div>`;
  results.forEach(r=>{
    html += `
      <div class="br-item" onclick="goToUnit('${r.unit.id}')">
        <div class="br-left">
          <div class="br-unit">${r.unit.id} · ${r.floor}</div>
          <div class="br-info">${r.ping} 坪 · ${r.unit.type}</div>
        </div>
        <div style="display:flex;align-items:center;">
          <div class="br-price">${r.price.toLocaleString()} 萬</div>
          <div class="br-arrow">›</div>
        </div>
      </div>`;
  });
  html += '</div>';
  document.getElementById('budget-results').innerHTML = html;
}

function goToUnit(id){
  const u = getUnit(id);
  currentTower = u.tower;
  currentUnit = id;
  document.querySelectorAll('.tower-pill').forEach(p=>p.classList.remove('active'));
  document.getElementById('tower-'+u.tower).classList.add('active');
  renderChips();
  renderDetail(id);
  showPage('browse');
}

// Init
renderChips();
