*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:#f5f3ef;color:#1a1a1a;min-height:100vh;}
.header{background:#1a1208;padding:14px 20px;position:sticky;top:0;z-index:200;display:flex;justify-content:space-between;align-items:center;}
.header-left .title{font-family:'Noto Serif TC',serif;font-size:18px;color:#c9a227;letter-spacing:2px;}
.header-left .sub{font-size:10px;color:#7a6030;letter-spacing:3px;margin-top:2px;}
.compare-btn{background:transparent;border:1px solid #c9a227;color:#c9a227;padding:7px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;}
.compare-badge{background:#e53e3e;color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;display:none;}
.compare-badge.show{display:inline;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#1a1208;border-top:1px solid #2a1f00;display:flex;z-index:200;}
.nav-btn{flex:1;padding:10px 4px 14px;text-align:center;border:none;background:none;cursor:pointer;font-family:inherit;font-size:9px;color:#6b5010;transition:color 0.2s;letter-spacing:1px;}
.nav-btn.active{color:#c9a227;}
.nav-icon{font-size:18px;display:block;margin-bottom:3px;}
.page{display:none;padding-bottom:75px;}
.page.active{display:block;}
.tower-bar{background:#1a1208;padding:12px 20px;border-bottom:1px solid #2a1f00;}
.tower-pills{display:flex;gap:8px;}
.tower-pill{padding:7px 22px;border-radius:4px;border:1px solid #4a3800;font-size:13px;cursor:pointer;background:transparent;color:#8b6030;font-family:inherit;font-weight:500;transition:all 0.2s;}
.tower-pill.active{background:#c9a227;border-color:#c9a227;color:#1a1208;font-weight:700;}
.unit-chips-wrap{background:#f0ece3;padding:12px 20px;border-bottom:1px solid #ddd;}
.chips-label{font-size:10px;color:#999;letter-spacing:2px;margin-bottom:8px;}
.unit-chips{display:flex;flex-wrap:wrap;gap:7px;}
.unit-chip{padding:7px 16px;border-radius:4px;border:1px solid #c5b99a;font-size:13px;cursor:pointer;background:#fff;color:#5a4a2a;font-family:inherit;font-weight:500;transition:all 0.2s;}
.unit-chip.active{background:#1a1208;border-color:#1a1208;color:#c9a227;font-weight:700;}
.unit-detail{padding:16px 20px;}
.unit-header-card{background:#1a1208;border-radius:10px;padding:18px 20px;margin-bottom:16px;}
.uh-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.uh-id{font-family:'Noto Serif TC',serif;font-size:42px;color:#c9a227;line-height:1;}
.uh-type{font-size:12px;color:#8b6030;letter-spacing:2px;margin-top:4px;}
.uh-price-range{text-align:right;}
.uh-price-label{font-size:10px;color:#6b5010;letter-spacing:1px;}
.uh-price-val{font-family:'Noto Serif TC',serif;font-size:17px;color:#c9a227;margin-top:3px;}
/* 坪數四格 */
.area-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:#2a1f00;border-radius:8px;overflow:hidden;margin-bottom:14px;}
.area-cell{background:#231810;padding:11px 14px;}
.area-cell-label{font-size:9px;color:#6b5010;letter-spacing:1px;margin-bottom:4px;}
.area-cell-val{font-size:19px;color:#c9a227;font-weight:500;line-height:1;}
.area-cell-unit{font-size:10px;color:#8b6030;margin-left:2px;}
.area-cell-sub{font-size:10px;color:#5a4020;margin-top:2px;}
/* 公設比強調 */
.area-cell.pubset .area-cell-val{color:#e8c050;font-size:16px;}
.add-compare-btn{width:100%;background:transparent;border:1px solid #4a3800;color:#a07820;padding:9px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.add-compare-btn.added{background:#c9a227;border-color:#c9a227;color:#1a1208;font-weight:700;}
.section-card{background:#fff;border-radius:10px;margin-bottom:12px;overflow:hidden;border:1px solid #e8e2d6;}
.section-title{background:#f5f0e8;padding:10px 16px;font-size:11px;font-weight:700;letter-spacing:2px;color:#5a4a2a;border-bottom:1px solid #e8e2d6;}
/* 樓層表 */
.floor-row{display:grid;grid-template-columns:60px 1fr 1fr 90px;align-items:center;padding:8px 16px;border-bottom:1px solid #f0ebe0;gap:6px;}
.floor-row:last-child{border-bottom:none;}
.floor-row.special{background:#fffbf0;}
.floor-row.header-row{background:#f5f0e8;font-size:10px;color:#888;letter-spacing:1px;padding:6px 16px;}
.fr-floor{font-size:13px;color:#5a4a2a;font-weight:600;}
.fr-ping{font-size:11px;color:#999;text-align:center;}
.fr-area{font-size:10px;color:#aaa;text-align:center;line-height:1.4;}
.fr-price{font-size:15px;color:#1a1208;font-weight:700;text-align:right;}
.fr-price.highlight{color:#b8860b;}
.feature-item{padding:10px 16px;border-bottom:1px solid #f5f0e8;display:flex;gap:10px;align-items:flex-start;}
.feature-item:last-child{border-bottom:none;}
.feat-dot{width:6px;height:6px;background:#c9a227;border-radius:50%;flex-shrink:0;margin-top:5px;}
.feat-text{font-size:13px;color:#333;line-height:1.6;}
.spec-row{display:flex;padding:9px 16px;border-bottom:1px solid #f5f0e8;}
.spec-row:last-child{border-bottom:none;}
.spec-label{font-size:12px;color:#888;width:90px;flex-shrink:0;}
.spec-val{font-size:12px;color:#222;font-weight:500;flex:1;}
/* Compare */
.compare-page-inner{padding:16px 20px;}
.compare-selector{background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:14px;border:1px solid #e8e2d6;}
.cs-label{font-size:11px;color:#888;letter-spacing:2px;margin-bottom:10px;}
.cs-chips{display:flex;flex-wrap:wrap;gap:7px;}
.cs-chip{padding:6px 14px;border-radius:4px;border:1px solid #ccc;font-size:12px;cursor:pointer;background:#fff;color:#555;font-family:inherit;transition:all 0.2s;}
.cs-chip.selected{background:#1a1208;border-color:#1a1208;color:#c9a227;}
.cs-chip.disabled{opacity:0.4;cursor:not-allowed;}
.compare-table-wrap{background:#fff;border-radius:10px;border:1px solid #e8e2d6;overflow:hidden;}
.ct-header{display:grid;border-bottom:2px solid #1a1208;}
.ct-row{display:grid;border-bottom:1px solid #f0ebe0;}
.ct-row:last-child{border-bottom:none;}
.ct-label{background:#f5f0e8;padding:10px 14px;font-size:11px;color:#5a4a2a;font-weight:700;letter-spacing:1px;display:flex;align-items:center;}
.ct-cell{padding:10px 14px;font-size:13px;color:#222;border-left:1px solid #f0ebe0;display:flex;align-items:center;justify-content:center;text-align:center;}
.ct-cell.best{color:#b8860b;font-weight:700;}
.ct-unit-id{font-family:'Noto Serif TC',serif;font-size:22px;color:#c9a227;}
.ct-unit-type{font-size:10px;color:#888;letter-spacing:1px;}
.compare-empty{text-align:center;padding:40px 20px;color:#aaa;font-size:14px;}
.ct-2{grid-template-columns:100px 1fr 1fr;}
.ct-3{grid-template-columns:100px 1fr 1fr 1fr;}
.ct-1{grid-template-columns:100px 1fr;}

.budget-form{background:#fff;border-radius:10px;padding:16px;margin-bottom:16px;border:1px solid #e8e2d6;}
.budget-title{font-size:11px;color:#888;letter-spacing:2px;margin-bottom:12px;}
.budget-inputs{display:flex;align-items:center;gap:10px;}

.budget-search-btn{background:#1a1208;color:#c9a227;border:none;padding:10px 18px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:700;}

.br-header{background:#1a1208;padding:10px 16px;font-size:11px;color:#8b6030;letter-spacing:2px;}
.br-item{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid #f5f0e8;cursor:pointer;}

.placeholder{text-align:center;padding:60px 20px;color:#aaa;}
.ph-icon{font-size:40px;margin-bottom:10px;}
.ph-text{font-size:14px;}

</head>

let currentTower="A",currentUnit=null,compareList=[];

function getUnit(id){return units[id];}
function getTowerUnits(t){return Object.values(units).filter(u=>u.tower===t);}
function minPrice(u){return Math.min(...u.floors.map(f=>f.price));}
function maxPrice(u){return Math.max(...u.floors.map(f=>f.price));}

function showPage(name){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("page-"+name).classList.add("active");
  document.getElementById("nav-"+name).classList.add("active");
  if(name==="compare"){renderCompareTable();renderCompareSelector();}
}

function selectTower(t){
  currentTower=t;currentUnit=null;
  document.querySelectorAll(".tower-pill").forEach(p=>p.classList.remove("active"));
  document.getElementById("tower-"+t).classList.add("active");
  renderChips();
  document.getElementById("unit-detail-area").innerHTML='<div class="placeholder"><div class="ph-icon">🏠</div><div class="ph-text">請選擇戶型</div></div>';
}

function renderChips(){
  const us=getTowerUnits(currentTower);
  document.getElementById("unit-chips").innerHTML=us.map(u=>
    '<button class="unit-chip'+(currentUnit===u.id?' active':'')+'" onclick="selectUnit(\''+u.id+'\')">'+u.id+'</button>'
  ).join('');
}

function selectUnit(id){currentUnit=id;renderChips();renderDetail(id);}

function renderDetail(id){
  const u=getUnit(id);
  const inC=compareList.includes(id);
  const lo=minPrice(u),hi=maxPrice(u);
  const a=u.area;
  let html='<div class="unit-detail">';
  // Header card
  html+='<div class="unit-header-card">';
  html+='<div class="uh-top"><div><div class="uh-id">'+u.id+'</div><div class="uh-type">'+u.type+'</div></div>';
  html+='<div class="uh-price-range"><div class="uh-price-label">定價區間</div><div class="uh-price-val">'+lo.toLocaleString()+'～'+hi.toLocaleString()+' 萬</div></div></div>';
  // 4格坪數
  html+='<div class="area-grid">';
  html+='<div class="area-cell"><div class="area-cell-label">主建物室內</div><div class="area-cell-val">'+a.main+'<span class="area-cell-unit">坪</span></div></div>';
  html+='<div class="area-cell"><div class="area-cell-label">陽台（附屬建物）</div><div class="area-cell-val">'+a.balcony+'<span class="area-cell-unit">坪</span></div></div>';
  html+='<div class="area-cell"><div class="area-cell-label">公設占坪</div><div class="area-cell-val">'+a.publicSet+'<span class="area-cell-unit">坪</span></div></div>';
  html+='<div class="area-cell pubset"><div class="area-cell-label">權狀總坪 / 公設比</div><div class="area-cell-val">'+a.total+'坪</div><div class="area-cell-sub">公設比 '+a.publicRatio+'%</div></div>';
  html+='</div>';
  // 備注
  if(u.note) html+='<div style="font-size:11px;color:#8b6030;line-height:1.6;margin-top:10px;padding:8px 10px;background:#2a1f00;border-radius:6px;">📋 '+u.note+'</div>';
  html+='<button class="add-compare-btn'+(inC?' added':'')+'" onclick="toggleCompare(\''+id+'\')">'+( inC?'✓ 已加入比較':'＋ 加入比較')+'</button>';
  html+='</div>';
  // 規格
  html+='<div class="section-card"><div class="section-title">▸ 規格資訊</div>';
  u.specs.forEach(s=>{ html+='<div class="spec-row"><div class="spec-label">'+s.l+'</div><div class="spec-val">'+s.v+'</div></div>'; });
  html+='</div>';
  // 亮點
  html+='<div class="section-card"><div class="section-title">▸ 銷售亮點</div>';
  u.features.forEach(f=>{ html+='<div class="feature-item"><div class="feat-dot"></div><div class="feat-text">'+f+'</div></div>'; });
  html+='</div>';
  // 樓層定價
  html+='<div class="section-card"><div class="section-title">▸ 各樓層定價（車位另計）</div>';
  html+='<div class="floor-row header-row"><div>樓層</div><div style="text-align:center">權狀坪</div><div style="text-align:center">主建/陽台/公設</div><div style="text-align:right">定價</div></div>';
  u.floors.forEach(fl=>{
    html+='<div class="floor-row'+(fl.special?' special':'')+'">';
    html+='<div class="fr-floor">'+fl.f+'</div>';
    html+='<div class="fr-ping">'+fl.total+'坪</div>';
    html+='<div class="fr-area">'+fl.main+' / '+fl.balcony+' / '+fl.pub+'</div>';
    html+='<div class="fr-price'+(fl.special?' highlight':'')+'">'+fl.price.toLocaleString()+' 萬</div>';
    html+='</div>';
  });
  html+='</div></div>';
  document.getElementById("unit-detail-area").innerHTML=html;
  window.scrollTo(0,0);
}

function toggleCompare(id){
  if(compareList.includes(id)){compareList=compareList.filter(x=>x!==id);}
  else{ if(compareList.length>=3){alert("最多比較3個戶型");return;} compareList.push(id); }
  updateCompareBadge();
  if(currentUnit) renderDetail(currentUnit);
}
function updateCompareBadge(){
  const b=document.getElementById("compare-badge");
  b.textContent=compareList.length;
  b.className="compare-badge"+(compareList.length>0?" show":"");
}
function renderCompareSelector(){
  document.getElementById("compare-chips").innerHTML=Object.keys(units).map(id=>{
    const sel=compareList.includes(id);
    const dis=!sel&&compareList.length>=3;
    const cls2="cs-chip"+(sel?" selected":"")+(dis?" disabled":"");
    const oc=dis?"":"toggleCompareChip('"+id+"')";
    return '<button class="'+cls2+'" onclick="'+oc+'">'+id+'</button>';
  }).join('');
}
function toggleCompareChip(id){toggleCompare(id);renderCompareSelector();renderCompareTable();}

function renderCompareTable(){
  if(compareList.length<2){document.getElementById("compare-table-area").innerHTML='<div class="compare-empty">請選擇至少兩個戶型進行比較</div>';return;}
  const us=compareList.map(id=>getUnit(id));
  const cls="ct-"+us.length;
  const best=(vals,fn)=>{const bv=fn(vals);return vals.map(v=>v===bv);};
  const pings=us.map(u=>u.area.main);
  const totals=us.map(u=>u.area.total);
  const balcs=us.map(u=>u.area.balcony);
  const pubs=us.map(u=>u.area.publicSet);
  const pubrs=us.map(u=>u.area.publicRatio);
  const minps=us.map(u=>minPrice(u));
  const maxps=us.map(u=>maxPrice(u));
  const bPing=best(pings,v=>Math.max(...v));
  const bTotal=best(totals,v=>Math.max(...v));
  const bMinP=best(minps,v=>Math.min(...v));
  const bMaxP=best(maxps,v=>Math.min(...v));
  const bPubR=best(pubrs,v=>Math.min(...v));
  let t='<div class="compare-table-wrap">';
  t+='<div class="ct-header '+cls+'"><div class="ct-label">比較項目</div>';
  us.forEach(u=>{ t+='<div class="ct-cell"><div class="ct-unit-id">'+u.id+'</div><div class="ct-unit-type">'+u.type+'</div></div>'; });
  t+='</div>';
  const row=(label,vals,bests,sfx)=>{
    let r='<div class="ct-row '+cls+'"><div class="ct-label">'+label+'</div>';
    vals.forEach((v,i)=>{ r+='<div class="ct-cell'+(bests&&bests[i]?' best':'')+'">'+v+(sfx||'')+'</div>'; });
    return r+'</div>';
  };
  t+=row("主建物室內",pings.map(v=>v+"坪"),bPing);
  t+=row("陽台坪數",balcs.map(v=>v+"坪"),null);
  t+=row("公設占坪",pubs.map(v=>v+"坪"),null);
  t+=row("權狀總坪",totals.map(v=>v+"坪"),bTotal);
  t+=row("公設比",pubrs.map(v=>v+"%"),bPubR);
  t+=row("最低定價",minps.map(v=>v.toLocaleString()+"萬"),bMinP);
  t+=row("最高定價",maxps.map(v=>v.toLocaleString()+"萬"),bMaxP);
  t+=row("格局",us.map(u=>u.type),null);
  t+='<div class="ct-row '+cls+'"><div class="ct-label">銷售特色</div>';
  us.forEach(u=>{ t+='<div class="ct-cell" style="text-align:left;font-size:11px;line-height:1.7;padding:12px 14px;">'+u.features.map(f=>"・"+f).join("<br>")+'</div>'; });
  t+='</div></div>';
  document.getElementById("compare-table-area").innerHTML=t;
}

function searchBudget(){
  const lo=parseInt(document.getElementById("budget-min").value)||0;
  const hi=parseInt(document.getElementById("budget-max").value)||999999;
  const results=[];
  Object.values(units).forEach(u=>{
    u.floors.forEach(fl=>{
      if(fl.price>=lo&&fl.price<=hi) results.push({unit:u,floor:fl.f,price:fl.price,total:fl.total,main:fl.main});
    });
  });
  results.sort((a,b)=>a.price-b.price);
  if(results.length===0){
    document.getElementById("budget-results").innerHTML='<div class="budget-results"><div class="br-header">查詢結果</div><div class="budget-empty">此預算範圍內無符合戶型，請調整區間</div></div>';
    return;
  }
  let html='<div class="budget-results"><div class="br-header">找到 '+results.length+' 個選項</div>';
  results.forEach(r=>{
    html+='<div class="br-item" onclick="goToUnit(\''+r.unit.id+'\')"><div class="br-left"><div class="br-unit">'+r.unit.id+' · '+r.floor+'</div>';
    html+='<div class="br-info">權狀'+r.total+'坪｜主建物'+r.main+'坪｜'+r.unit.type+'</div></div>';
    html+='<div style="display:flex;align-items:center;"><div class="br-price">'+r.price.toLocaleString()+' 萬</div><div class="br-arrow">›</div></div></div>';
  });
  html+='</div>';
  document.getElementById("budget-results").innerHTML=html;
}

function goToUnit(id){
  const u=getUnit(id);currentTower=u.tower;currentUnit=id;
  document.querySelectorAll(".tower-pill").forEach(p=>p.classList.remove("active"));
  document.getElementById("tower-"+u.tower).classList.add("active");
  renderChips();renderDetail(id);showPage("browse");
}
